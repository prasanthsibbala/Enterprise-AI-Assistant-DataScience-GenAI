version: "3.9"

services:
  backend:
    build: ./backend
    container_name: enterprise-ai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: enterprise-ai-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend